apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: expense
  labels:
    app: frontend
    tier: web
    project: expense
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
      tier: web
      project: expense
  template:
    metadata:
      labels:
        app: frontend
        tier: web
        project: expense
    spec:
      containers:
        - name: nginx
          image: rahul8096/frontend:1.0.0

---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: expense
spec:
  type: LoadBalancer # For ublic Purpose we will give the loadbalancer Service
  selector:
    app: frontend
    tier: web
    project: expense
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
